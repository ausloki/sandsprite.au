<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Sandsprite Admin — Log in</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .login-card { width: 100%; max-width: 360px; }
  .login-card .error { color: #b3261e; font-size: 0.9rem; margin-bottom: 1rem; }
</style>
</head>
<body>
  <div class="card login-card">
    <h1 style="font-size:1.4rem;">Sandsprite Admin</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" action="{{ url_for('login') }}">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required autofocus>
      <label for="password" style="margin-top:0.75rem;">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button class="btn btn-solid" type="submit" style="margin-top:1.25rem;width:100%;">Log in</button>
    </form>
  </div>
</body>
</html>
